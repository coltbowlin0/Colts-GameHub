<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Example webretro embed</title>
		<style>
			#webretro-container {
				width: 800px;
				height: 600px;
			}
		</style>
	</head>
	<body>
		<h1>Example webretro embed</h1>
		<div id="webretro-container"></div>
		<br>
		<input type="button" id="fullscreen" value="Fullscreen">
		<br>
		<br>
		<a href="roms/LICENSE.txt">License for the example game "2048"</a>
		
		<script type="text/javascript" src="embed.js"></script>
		<script>
			var frame = webretroEmbed(document.getElementById("webretro-container"), "../", {system: "nes", rom: "2048.nes"});
			document.getElementById("fullscreen").onclick = function() {
				frame.requestFullscreen();
			};
		</script>
		<!-- 1. The container where the game will appear -->
		<div id="game-container" style="width: 800px; height: 600px;"></div>

		<!-- 2. Load the helper script first -->
		<script src="embed/embed.js"></script>

		<!-- 3. Call the function to start the emulator -->
		<script>
		var container = document.getElementById('game-container');
		
		// Use your renamed file here
		var path = 'webretro.html'; 
		
		var options = {
			core: 'mgba',           // Change this to your preferred console core
			rom: 'my-game-file.gba' // The name of your ROM file
		};

		// This starts the magic
		webretroEmbed(container, path, options);
		</script>
	</body>
</html>
