<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://media.gq.com/photos/5fbd3397fff3e5e56de13fc1/16:9/w_2240,c_limit/Riz_Playlist.jpg">
    <title>Donkey Kong</title>
    <style>
        /* 1. Make the basic page container fill the entire screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Stops the whole page from scrolling */
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 10px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        h1 { margin: 0 0 10px 0; font-size: 24px; }

        #game-container {
            flex: 1; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            background-color: #111;
            padding: 8px;
            font-size: 14px;
            border-top: 1px solid #333;
        }

        button {
            padding: 5px 15px;
            cursor: pointer;
            background: #f0db4f;
            border: none;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>


    <div id="game-container"></div>

    <footer>Licensed by Colt 45's Game Hub</footer>

    <script>
        function webretroEmbed(node, path, queries) {
            var frame = document.createElement("iframe");

            frame.style.width = "100%";
            frame.style.height = "100%";
            frame.style.border = "none";
            frame.id = "game-frame";

            if (queries.rom) {
                var link = document.createElement("a");
                link.href = (/^(https?:)?\/\//i).test(queries.rom) ? queries.rom : "roms/" + queries.rom;
                queries.rom = link.href;
            }

            var queryString = Object.entries(queries)
                .map(i => i.map(val => val && encodeURIComponent(val)))
                .map(i => i[1] ? i.join("=") : i[0])
                .join("&");

            frame.src = path + "?" + queryString;
            
            node.appendChild(frame);

            node.addEventListener('mousedown', function() {
                frame.focus();
            });

            return frame;
        }

        var container = document.getElementById('game-container');
        var path = 'webretro.html'; 
        
        var options = {
            core: 'autodetect', 
            rom: 'donkey kong.nes'  // File is in your /roms/ folder
        };

        webretroEmbed(container, path, options);

    </script>

</body>
</html>
